name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # လိုအပ်တဲ့ gradle-wrapper.jar ရော gradle-wrapper.properties ပါ ဖန်တီးပေးမည့်အဆင့်
      - name: Fix and Generate Gradle Wrapper Files
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar
          cat <<EOF > gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Repository ငြိနေတဲ့ စနစ်ကို လျစ်လျူရှုပြီး APK အောင်မြင်စွာ Build လုပ်မည့်အဆင့်
      - name: Build with Gradle
        run: ./gradlew assembleRelease --no-daemon -Dorg.gradle.internal.repository.max.tenants=1
        env:
          GRADLE_OPTS: "-Dorg.gradle.project.android.useAndroidX=true"

      # ထွက်လာမည့် APK ဖိုင်ကို သိမ်းဆည်းပေးမည့်အဆင့်
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: "**/build/outputs/apk/release/*-release.apk"
