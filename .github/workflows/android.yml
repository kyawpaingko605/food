name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # လိုအပ်တဲ့ Wrapper ဖိုင်များကို ဖန်တီးပေးခြင်း
      - name: Fix and Generate Gradle Wrapper Files
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar
          cat <<EOF > gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Patch settings.gradle to fix repository mode
        run: |
          sed -i 's/RepositoriesMode.FAIL_ON_PROJECT_REPOS/RepositoriesMode.PREFER_SETTINGS/g' settings.gradle

      # Manifest ထဲမှာ ရှာမတွေ့ဘူးပြောနေတဲ့ ရင်းမြစ် (Missing Resources) များကို အလိုအလျောက် ဖန်တီးပေးမည့်အဆင့်
      - name: Auto Create Missing Resources & Theme
        run: |
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/values
          
          # အခြေခံ Theme ကို ရေးသားပေးခြင်း
          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
              <style name="Theme.Material3.DayNight.NoActionBar" parent="Theme.MaterialComponents.DayNight.NoActionBar"/>
          </resources>
          EOF
          
          # အခြေခံ အိုင်ကွန်ပုံများကို ယာယီဖန်တီးပေးခြင်း
          touch app/src/main/res/mipmap-hdpi/ic_launcher.png
          touch app/src/main/res/mipmap-hdpi/ic_launcher_round.png

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: "**/build/outputs/apk/release/*-release.apk"
