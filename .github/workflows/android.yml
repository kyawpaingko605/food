name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # food folder ထဲကိုဝင်ပြီး gradlew ဖိုင်ကို Permission ပေးတာပါ
      - name: Grant execute permission for gradlew
        run: |
          cd food
          chmod +x gradlew

      # food folder ထဲမှာပဲ APK Build ဆောက်ခိုင်းတာပါ
      - name: Build with Gradle
        run: |
          cd food
          ./gradlew assembleRelease

      # ထွက်လာမယ့် Native APK ဖိုင်ကို ရှာပြီး Upload တင်ပေးမယ့်အဆင့်
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: "**/build/outputs/apk/release/*-release.apk"
