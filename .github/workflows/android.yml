name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # လိုအပ်တဲ့ Wrapper ဖိုင်များကို ဖန်တီးပေးခြင်း
      - name: Fix and Generate Gradle Wrapper Files
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar
          cat <<EOF > gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Patch settings.gradle to fix repository mode
        run: |
          sed -i 's/RepositoriesMode.FAIL_ON_PROJECT_REPOS/RepositoriesMode.PREFER_SETTINGS/g' settings.gradle

      # Jetpack Compose အတွက် လိုအပ်သော အခြေခံ Theme နှင့် Icon များ ဖန်တီးပေးခြင်း
      - name: Auto Create Missing Resources & Theme
        run: |
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/values
          
          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
              <style name="Theme.Material3.DayNight.NoActionBar" parent="android:Theme.Material.NoActionBar"/>
          </resources>
          EOF
          
          cat <<EOF > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@android:color/white"/>
              <foreground android:drawable="@android:color/black"/>
          </adaptive-icon>
          EOF
          
          cat <<EOF > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@android:color/white"/>
              <foreground android:drawable="@android:color/black"/>
          </adaptive-icon>
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease --no-daemon

      # အထွက်ဖိုင်လမ်းကြောင်းကို လုံးဝတိကျသေချာအောင် ပြင်ဆင်ပေးလိုက်ခြင်း
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
