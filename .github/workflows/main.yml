name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # သင့်ရဲ့ Flutter ဖိုင်တွေရှိတဲ့ Folder ထဲကို အရင်ဝင်ပြီးမှ Run ခိုင်းတာပါ
      - name: Install dependencies
        run: |
          cd food
          flutter pub get

      # ဒီနေရာမှာလည်း Folder ထဲဝင်ပြီးမှ APK ဆောက်ခိုင်းတာပါ
      - name: Build APK
        run: |
          cd food
          flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: food/build/app/outputs/flutter-apk/app-release.apk
